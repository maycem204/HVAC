services:
  - type: web
    name: quoteai-hvac
    runtime: docker
    # Instance gratuite suffisante pour une demonstration client temporaire.
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quoteai-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        sync: false
      - key: EMBEDDING_MODEL
        value: BAAI/bge-m3
      - key: EMBEDDING_DIMENSIONS
        value: "1024"
      - key: EMBEDDING_BATCH_SIZE
        value: "8"
databases:
  - name: quoteai-postgres
    # PostgreSQL gratuit : 1 Go, sans sauvegarde et expiration apres 30 jours.
    plan: free
    databaseName: quoteai
    user: quoteai
