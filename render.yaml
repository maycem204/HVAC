services:
  - type: web
    name: quoteai-hvac
    runtime: docker
    # Instance gratuite suffisante pour une demonstration client temporaire.
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quoteai-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: AI_PROVIDER
        value: deepseek
      # LLM_API_KEY reste accepté afin de ne pas invalider le secret Render existant.
      - key: LLM_API_KEY
        sync: false
      - key: EMBEDDING_ENABLED
        value: "true"
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: EMBEDDING_MODEL
        value: gemini-embedding-2
      - key: EMBEDDING_DIMENSIONS
        value: "1024"
      - key: EMBEDDING_BATCH_SIZE
        value: "4"
      - key: EMBEDDING_QUOTA_RETRY_MS
        value: "900000"
      - key: GEOCODING_PROVIDER
        value: nominatim
      - key: MAP_TILE_ORIGINS
        value: https://tile.openstreetmap.org
databases:
  - name: quoteai-postgres
    # PostgreSQL gratuit : 1 Go, sans sauvegarde et expiration apres 30 jours.
    plan: free
    databaseName: quoteai
    user: quoteai
